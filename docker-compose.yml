# Spektrum static UI (nginx on :80 in the container).
# The browser calls the API; default in js/config.js: API :9001, Mercure :3000 (override via __SPEKTRUM_CONFIG__ if needed).
# Ensure CORS on the API allows this origin (e.g. http://127.0.0.1/ and http://localhost/).
#
# Usage:
#   docker compose up --build
#   open http://127.0.0.1/  (default host port 80; override with SPEKTRUM_HTTP_PORT if :80 is taken)
#
# Volumes: project web root is mounted over the image so HTML/CSS/JS edits on the host apply
# after a browser refresh (no image rebuild needed).

services:
  spektrum:
    build: .
    image: mbuelow.dev/spektrum:latest
    ports:
      - "${SPEKTRUM_HTTP_PORT:-80}:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html
      - ./css:/usr/share/nginx/html/css
      - ./js:/usr/share/nginx/html/js
      - ./assets:/usr/share/nginx/html/assets
    restart: unless-stopped
